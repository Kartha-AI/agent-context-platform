services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: acp
      POSTGRES_USER: acp
      POSTGRES_PASSWORD: localdev
    volumes:
      - acp-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acp -d acp"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://acp:localdev@db:5432/acp
      PORT: "3002"
      API_KEY: dev-key
      LOG_LEVEL: debug
    depends_on:
      db:
        condition: service_healthy

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://acp:localdev@db:5432/acp
      PORT: "3001"
      LOG_LEVEL: debug
    depends_on:
      db:
        condition: service_healthy

volumes:
  acp-data:
