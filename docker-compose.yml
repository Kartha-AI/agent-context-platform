services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: acp
      POSTGRES_USER: acp
      POSTGRES_PASSWORD: localdev
    volumes:
      - pgdata:/var/lib/postgresql/data

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://acp:localdev@db:5432/acp
      PORT: "3001"
    depends_on:
      - db

volumes:
  pgdata:
