name: case-escalation-monitor
description: "Monitors support cases for escalation triggers using business context that traditional rule engines can't access"
version: "1.0"
category: support-operations
requires: [case]
optional: [customer]
operations: [get_context_changes, get_entity, get_transactions, record_transaction]
trigger:
  recommended: schedule
  interval: 2h
  description: "Run every 2 hours to catch SLA risks early, or on-demand when reviewing the support queue"
outputs:
  transaction_type: escalation_assessed
  context_fields: [escalation_decision, reason, recommended_actions, case_summary, customer_context]
apqc:
  category: "5. Manage Customer Service"
  process: "5.2.3 Manage Escalations"
